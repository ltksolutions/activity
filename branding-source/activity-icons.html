<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>activity — icon set</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Albert+Sans:wght@700&display=swap">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f3ed; font-family: 'Geist', system-ui, sans-serif; color: #0e0e10; }
.page { max-width: 1200px; margin: 0 auto; padding: 64px 48px 120px; }
h1 { font-family: 'Albert Sans', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 6px; }
.sub { font-size: 13px; color: rgba(0,0,0,0.5); margin-bottom: 56px; }
.section-title { font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(0,0,0,0.4); margin-bottom: 20px; margin-top: 52px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
.icon-cell {
  background: #fafaf7;
  border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px 8px 14px;
  gap: 10px;
  cursor: pointer;
  transition: background 0.12s, box-shadow 0.12s;
}
.icon-cell:hover { background: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
.icon-cell span {
  font-family: 'Geist Mono', monospace;
  font-size: 9px; letter-spacing: 0.04em; text-align: center;
  color: rgba(0,0,0,0.45);
}
/* Size toggles */
.toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
.size-btn {
  font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 6px 12px; border-radius: 999px; border: 1px solid #e8e6df;
  background: transparent; cursor: pointer; color: rgba(0,0,0,0.6);
  transition: background 0.12s, color 0.12s;
}
.size-btn.active { background: #0e0e10; color: #fafaf7; border-color: #0e0e10; }
.dark-toggle {
  margin-left: auto;
  font-family: 'Geist', sans-serif; font-size: 12px; font-weight: 500;
  padding: 7px 16px; border-radius: 999px; border: 1px solid #e8e6df;
  background: transparent; cursor: pointer; color: rgba(0,0,0,0.7);
}
body.dark-mode { background: #0e0e10; color: #fafaf7; }
body.dark-mode .icon-cell { background: #1a1a1e; }
body.dark-mode .icon-cell:hover { background: #22222a; }
body.dark-mode .section-title { color: rgba(255,255,255,0.4); }
body.dark-mode .sub { color: rgba(255,255,255,0.4); }
body.dark-mode .size-btn { border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); }
body.dark-mode .size-btn.active { background: #fafaf7; color: #0e0e10; }
body.dark-mode .dark-toggle { border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); }
body.dark-mode .icon-cell span { color: rgba(255,255,255,0.35); }
</style>
</head>
<body>
<div class="page">
  <h1>activity — icon set</h1>
  <p class="sub">32 ikôn · konzistentné s logo markom · stroke 1.8px · 24×24 grid · Albert Sans 700</p>

  <div class="toolbar">
    <button class="size-btn" onclick="setSize(16)">16</button>
    <button class="size-btn active" onclick="setSize(24)">24</button>
    <button class="size-btn" onclick="setSize(32)">32</button>
    <button class="size-btn" onclick="setSize(48)">48</button>
    <button class="dark-toggle" onclick="toggleDark()">Light / Dark</button>
  </div>

  <div class="section-title">Communication</div>
  <div class="grid" id="grid-comm"></div>

  <div class="section-title">People</div>
  <div class="grid" id="grid-people"></div>

  <div class="section-title">Activity & Sport</div>
  <div class="grid" id="grid-sport"></div>

  <div class="section-title">Navigation & UI</div>
  <div class="grid" id="grid-nav"></div>
</div>

<path d="M17 6 L20 6 C20 9 18 11 17 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>

    ['medal', `<circle cx="12" cy="14" r="6" stroke="${BLUE}" stroke-width="1.8" fill="none"/>
<path d="M9 3 L15 3 L12 8 Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" fill="none"/>

function renderIcon(svgContent, size) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="color:${darkMode?'#fafaf7':'#0e0e10'}">${svgContent}</svg>`;
}

function buildGrid(containerId, items) {
  const container = document.getElementById(containerId);
  container.innerHTML = items.map(([name, svg]) => `
    <div class="icon-cell" title="Copy SVG: ${name}" onclick="copySVG('${name}', \`${svg.replace(/`/g,'\\`')}\`)">
      ${renderIcon(svg, currentSize)}
      <span>${name}</span>
    </div>
  `).join('');
}

function renderAll() {
  buildGrid('grid-comm',   icons.comm);
  buildGrid('grid-people', icons.people);
  buildGrid('grid-sport',  icons.sport);
  buildGrid('grid-nav',    icons.nav);
}

function setSize(s) {
  currentSize = s;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderAll();
}

function toggleDark() {
  darkMode = !darkMode;
  document.body.classList.toggle('dark-mode', darkMode);
  renderAll();
}

function copySVG(name, paths) {
  const svg = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">\n${paths}\n</svg>`;
  navigator.clipboard.writeText(svg).then(() => {
    const cells = document.querySelectorAll('.icon-cell');
    cells.forEach(c => { if(c.title.includes(name)) { c.style.background = '#0e0e10'; setTimeout(() => c.style.background = '', 500); } });
  });
}

renderAll();
</script>
</body>
</html>
