<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="activity — platforma pre slovenský šport">
  <title>activity — platforma pre slovenský šport</title>
  <!-- Navy pozadie -->
  <rect x="0" y="0" width="1200" height="630" fill="#1A2D47"/>

  <!-- Decorative red stripe vlavo (slovenska narodna inspirovana) -->
  <rect x="0" y="0" width="12" height="630" fill="#C8102E"/>

  <!-- Hlavny logo blok - vycentrovany hore -->
  <g transform="translate(180, 165)">
    <path d="M860,14 L102,14 C50,14 8,55 6,108 C4,165 25,225 95,228 L860,228 C875,228 890,213 895,200 L902,138 C905,120 903,100 896,82 L888,30 C884,17 874,14 860,14 Z" fill="#FFFFFF" transform="scale(0.75)"/>
    <text x="55" y="135" font-family="Helvetica Neue, Helvetica, Arial Black, sans-serif" font-size="135" font-weight="900" font-style="italic" fill="#1A2D47" letter-spacing="-3">activity</text>
    <text x="675" y="135" font-family="Helvetica Neue, Helvetica, Arial Black, sans-serif" font-size="143" font-weight="900" font-style="italic" fill="#C8102E" letter-spacing="-2">UP</text>
  </g>

  <!-- Hlavny nadpis -->
  <text x="600" y="430" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#FFFFFF" text-anchor="middle">Aktivity, mentoring a komunikácia</text>
  <text x="600" y="495" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#FFFFFF" text-anchor="middle">v slovenskom športe</text>

  <!-- Sub-text -->
  <text x="600" y="565" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#8E8E92" text-anchor="middle">activity.sportup.sk · klient projektu sportup.sk</text>
</svg>
